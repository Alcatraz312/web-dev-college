<!DOCTYPE html>
<html>
<head><title>Images in HTML</title></head>
<body>
  <h2>Logo Image</h2>
  <img src="20230602130700.jpg" alt="College Logo" width="150" height="80">

  <h2>Image as Clickable Icon</h2>
  <a href="https://www.google.com">
    <img src="search_icon.png" alt="Search" width="50" height="50" border="0">
  </a>

  <h2>Image in Table Cell</h2>
  <table border="1">
    <tr>
      <th>Name</th>
      <th>Photo</th>
    </tr>
    <tr>
      <td>Student</td>
      <td><img src="illustration-of-boy-and-girl-student-talking-in-class-vector.jpg" width="60" height="60"></td>
    </tr>
  </table>

  <h2>Table with Background Image</h2>
  <table background="bg.jpg" border="1" width="300">
    <tr>
      <td>Cell 1</td>
      <td>Cell 2</td>
    </tr>
  </table>
</body>
</html>
