<!DOCTYPE html>
<html>
<head>
    <title>Images in HTML</title>
</head>

<body bgcolor="lightblue">

    <h1 align="center">Images in Webpages</h1>

    <!-- Simple Image -->
    <h2>Simple Image</h2>

    <img src="image.jpg" alt="Sample Image" width="300" height="200">

    <hr>

    <!-- Logo Example -->
    <h2>Logo Example</h2>

    <img src="logo.png" alt="Logo" width="150">

    <hr>

    <!-- Clickable Image -->
    <h2>Clickable Image</h2>

    <a href="https://www.google.com">
        <img src="google.png" alt="Google" width="200">
    </a>

    <hr>

    <!-- Background Image Table -->
    <h2>Table with Background</h2>

    <table border="1" background="bg.jpg" cellpadding="10">

        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>BCA</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Anita</td>
            <td>BCA</td>
            <td>90</td>
        </tr>

    </table>

</body>
</html>
