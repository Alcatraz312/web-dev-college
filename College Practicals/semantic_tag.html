<!DOCTYPE html>
<html>
<head>
    <title>Semantic Tags Example</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        header, nav, main, section, footer {
            border: 1px solid black;
            padding: 15px;
            margin: 10px 0;
        }

        nav {
            background-color: lightgray;
        }

        footer {
            background-color: lightblue;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <main>

        <!-- Section -->
        <section>
            <h2>About HTML Semantic Tags</h2>

            <p>
                Semantic tags describe the meaning of the content.
            </p>
        </section>

        <!-- Figure and Figure Caption -->
        <figure>
            <img src="nature.jpg" alt="Nature Image"
                 width="300" height="200">

            <figcaption>
                Fig 1: Beautiful Nature Image
            </figcaption>
        </figure>

        <br>

        <!-- Details and Summary -->
        <details>
            <summary>Click to Read More</summary>

            <p>
                HTML5 introduced semantic tags to improve webpage structure
                and readability.
            </p>
        </details>

    </main>

    <!-- Footer -->
    <footer>
        <p>Copyright © 2026 My Website</p>
    </footer>

</body>
</html>
