<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>

<body>

    <h1>Ordered and Unordered Lists</h1>

    <h2>Ordered List</h2>

    <ol>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Orange</li>
    </ol>

    <h2>Unordered List</h2>

    <ul>
        <li>Red</li>
        <li>Blue</li>
        <li>Green</li>
        <li>Yellow</li>
    </ul>

    <h2>Nested List</h2>

    <ol>
        <li>Programming Languages
            <ul>
                <li>Python</li>
                <li>Java</li>
                <li>C++</li>
            </ul>
        </li>
    </ol>

</body>
</html>
